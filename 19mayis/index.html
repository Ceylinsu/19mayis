<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR Projesi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #startButton, #unmuteButton {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; font-size: 20px; color: white; border: none; border-radius: 10px; z-index: 9999;
      }
      #startButton { background-color: #e74c3c; }
      #unmuteButton { display: none; background-color: #27ae60; bottom: 50px; }
      /* Hata mesajlarını ekranda görmek için */
      #errorLog {
        position: absolute; top: 10px; left: 10px; color: red; background: white; z-index: 10000; font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="errorLog"></div>
    <button id="startButton">Kamerayı Aç</button>
    <button id="unmuteButton">Sesi Aç 🔊</button>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind; autoStart: false;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video-19mayis" src="./resim_video/19mayis.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#video-19mayis" position="0 0 0" height="1.2" width="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startButton = document.querySelector('#startButton');
      const unmuteButton = document.querySelector('#unmuteButton');
      const video = document.querySelector('#video-19mayis');
      const log = document.querySelector('#errorLog');

      // Hataları ekrana yazdıralım ki ne olduğunu anlayalım
      window.addEventListener('error', (e) => {
        log.innerHTML += e.message + "<br>";
      });

      startButton.addEventListener('click', () => {
        log.innerHTML = "Kamera başlatılıyor...<br>";
        sceneEl.setAttribute('mindar-image', 'imageTargetSrc: ./resim_video/targets.mind; autoStart: true;');
        
        // Kamera erişimi kontrolü
        navigator.mediaDevices.getUserMedia({video: true})
        .then(() => {
            sceneEl.systems["mindar-image-system"].start();
            startButton.style.display = 'none';
        })
        .catch((err) => {
            log.innerHTML += "KAMERA HATASI: " + err.name + " - " + err.message + "<br>Lütfen tarayıcı ayarlarından kameraya izin verin.";
        });
      });

      document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
        video.play();
        if(video.muted) unmuteButton.style.display = 'block'; 
      });

      unmuteButton.addEventListener('click', () => {
        video.muted = false;
        unmuteButton.style.display = 'none';
      });
    </script>
  </body>
</html>
