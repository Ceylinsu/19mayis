<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>19 Mayıs AR Projesi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; background-color: #000; color: white; font-family: sans-serif; }
      #loading {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; z-index: 1000;
      }
      #startButton, #unmuteButton {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; font-size: 18px; color: white; border: none; border-radius: 10px; z-index: 9999; display: none;
      }
      #startButton { background-color: #e74c3c; }
      #unmuteButton { background-color: #27ae60; bottom: 80px; }
    </style>
  </head>
  <body>
    <div id="loading">Sistem Yükleniyor...<br>Lütfen bekleyin.</div>
    <button id="startButton">Kamerayı Başlat</button>
    <button id="unmuteButton">Sesi Aç 🔊</button>

    <a-scene mindar-image="imageTargetSrc: resim_video/targets.mind; autoStart: false; uiLoading: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video-19mayis" src="resim_video/19mayis.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#video-19mayis" position="0 0 0" height="1" width="1.5"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startButton = document.querySelector('#startButton');
      const unmuteButton = document.querySelector('#unmuteButton');
      const video = document.querySelector('#video-19mayis');
      const loading = document.querySelector('#loading');

      // Sistem hazır olduğunda yükleme yazısını kaldır ve butonu göster
      sceneEl.addEventListener("renderstart", () => {
        loading.style.display = "none";
        startButton.style.display = "block";
      });

      startButton.addEventListener('click', () => {
        sceneEl.systems["mindar-image-system"].start();
        startButton.style.display = 'none';
      });

      document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
        video.play();
        if(video.muted) unmuteButton.style.display = 'block'; 
      });

      unmuteButton.addEventListener('click', () => {
        video.muted = false;
        unmuteButton.style.display = 'none';
      });
    </script>
  </body>
</html>
